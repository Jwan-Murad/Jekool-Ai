<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيكول AI | النسخة المستقرة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 90%;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            margin: 30px auto;
        }
        h1 {
            font-size: 2rem;
            color: #ffca28;
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: right;
            color: #ffca28;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: #111827;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: left;
        }
        .btn {
            width: 100%;
            background-color: #ffca28;
            color: #0b0f19;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .btn:hover {
            background-color: #ffe082;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 8px;
            border-right: 4px solid #ffca28;
            display: none;
            text-align: right;
            line-height: 1.8;
        }
        .result-box h3 {
            margin-top: 0;
            color: #ffca28;
        }
        .loading {
            display: none;
            color: #ffca28;
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
        }
        .api-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #ffca28;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 جيكول AI - المحرك الذكي الشامل</h1>
        
        <div class="api-section">
            <label style="text-align: right;">مفتاح الـ API الخاص بك من Google:</label>
            <input type="text" id="apiKey" placeholder="الصق مفتاحك هنا...">
        </div>

        <label for="topic">عنوان الفيديو أو الفكرة الرئيسية:</label>
        <input type="text" id="topic" style="text-align: right;" placeholder="مثال: أسرار الأهرامات">

        <label for="duration">مدة السكربت المطلوبة:</label>
        <select id="duration" style="text-align: right;">
            <option value="قصير جداً (Shorts)">فيديو قصير (Shorts) - دقيقة</option>
            <option value="متوسط (5 دقائق)">فيديو متوسط - 5 دقائق</option>
        </select>

        <button class="btn" onclick="generateScriptFromAI()">توليد السكربت بالذكاء الاصطناعي الحقيقي ✨</button>

        <div class="loading" id="loadingText">جاري استدعاء العقل الاصطناعي وصياغة السكربت... 🧠</div>

        <div class="result-box" id="resultBox">
            <h3 id="resultTitle">📜 السكربت الذكي الجاهز:</h3>
            <p id="scriptOutput" style="white-space: pre-line; text-align: right;"></p>
        </div>
    </div>

    <script>
        async function generateScriptFromAI() {
            var topic = document.getElementById('topic').value.trim();
            var duration = document.getElementById('duration').value;
            var apiKey = document.getElementById('apiKey').value.trim();

            if(!apiKey) {
                alert("من فضلك الصق المفتاح أولاً!");
                return;
            }
            if(topic === "") {
                alert("من فضلك أدخل موضوعاً أولاً!");
                return;
            }

            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            var promptText = `اكتب سكربت فيديو مشوق واحترافي ومتكامل باللغة العربية عن موضوع: "${topic}" وبمدة: ${duration}.`;

            try {
                // الاعتماد على النموذج الرئيسي والمستقر gemini-pro لحل مشكلة التوافقية تماماً
                var response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                var data = await response.json();
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';

                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    document.getElementById('resultTitle').innerText = "📜 السكربت الذكي الجاهز:";
                    document.getElementById('scriptOutput').innerText = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    document.getElementById('resultTitle').innerText = "❌ خطأ في الإعدادات:";
                    document.getElementById('scriptOutput').innerText = `الرسالة: ${data.error.message}`;
                } else {
                    document.getElementById('resultTitle').innerText = "❌ خطأ:";
                    document.getElementById('scriptOutput').innerText = JSON.stringify(data);
                }

            } catch (error) {
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultTitle').innerText = "❌ خطأ اتصال:";
                document.getElementById('scriptOutput').innerText = error.message;
            }
        }
    </script>
</body>
</html>
