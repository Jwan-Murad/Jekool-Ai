<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيكول AI | المحرك الذكي الكامل</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 90%;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            margin: 30px auto;
        }
        h1 {
            font-size: 2rem;
            color: #ffca28;
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: right;
            color: #ffca28;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: #111827;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: right;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ffca28;
        }
        .btn {
            width: 100%;
            background-color: #ffca28;
            color: #0b0f19;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .btn:hover {
            background-color: #ffe082;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 8px;
            border-right: 4px solid #ffca28;
            display: none;
            text-align: right;
            line-height: 1.8;
        }
        .result-box h3 {
            margin-top: 0;
            color: #ffca28;
        }
        .loading {
            display: none;
            color: #ffca28;
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
        }
        .api-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #ffca28;
        }
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #4b5563;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 جيكول AI - المحرك الذكي الشامل</h1>
        
        <div class="api-section" id="apiSection">
            <label for="apiKey">مفتاح الـ API الخاص بك من Google:</label>
            <input type="password" id="apiKey" placeholder="الِصق هنا مفتاح AI Studio السرّي الجديد...">
            <button class="btn" style="padding: 8px; font-size: 0.9rem; background-color: #10b981; color: white;" onclick="saveKey()">حفظ وتحديث المفتاح 🔒</button>
        </div>

        <label for="topic">عنون الفيديو أو الفكرة الرئيسيّة:</label>
        <input type="text" id="topic" placeholder="اكتب أي موضوع في العالم (مثال: أسرار الأهرامات)">

        <label for="duration">مدة السكربت المطلوبة:</label>
        <select id="duration">
            <option value="قصير جداً (Shorts)">فيديو قصير (Shorts / Reels) - دقيقة</option>
            <option value="متوسط (5 دقائق)">فيديو يوتيوب متوسط - 5 دقائق</option>
            <option value="وثائقي طويل (15 دقيقة)">وثائقي عميق - 15 دقيقة</option>
        </select>

        <button class="btn" onclick="generateScriptFromAI()">توليد السكربت بالذكاء الاصطناعي الحقيقي ✨</button>

        <div class="loading" id="loadingText">جاري صياغة السكربت الاحترافي بواسطة Gemini... 🧠</div>

        <div class="result-box" id="resultBox">
            <h3>📜 السكربت الذكي الجاهز:</h3>
            <p id="scriptOutput" style="white-space: pre-line;"></p>
        </div>
    </div>

    <footer>جميع الحقوق محفوظة © 2026 جيكول AI</footer>

    <script>
        window.onload = function() {
            var savedKey = localStorage.getItem('user_gemini_key');
            if(savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        }

        function saveKey() {
            var key = document.getElementById('apiKey').value.trim();
            if(key === "") {
                alert("الرجاء لصق المفتاح أولاً!");
                return;
            }
            localStorage.setItem('user_gemini_key', key);
            alert("تم تحديث وحفظ المفتاح بنجاح!");
        }

        async function generateScriptFromAI() {
            var topic = document.getElementById('topic').value.trim();
            var duration = document.getElementById('duration').value;
            // نأخذ القيمة المكتوبة في الخانة مباشرة لتجنب الأخطاء السابقة
            var apiKey = document.getElementById('apiKey').value.trim();

            if(!apiKey) {
                alert("من فضلك الصق مفتاح الـ API الخاص بك أولاً!");
                return;
            }
            if(topic === "") {
                alert("من فضلك أدخل عنواناً أو موضوعاً أولاً!");
                return;
            }

            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            var promptText = `أنت صانع محتوى محترف ومخرج وثائقيات. اكتب سكربت فيديو يوتيوب كامل واحترافي باللغة العربية عن موضوع: "${topic}". مدة الفيديو المطلوبة هي: ${duration}. قم بتقسيم السكربت إلى: عنوان مقترح، مقدمة مشوقة مع المؤثرات الصوتية والبصرية بين أقواس مربعة []، مشاهد متسلسلة مشروحة، وخاتمة تحتوي على دعوة للتفاعل والاشتراك في القناة. اجعل الأسلوب جذاباً ومثيراً للاهتمام.`;

            try {
                // استخدام نموذج gemini-1.5-flash الحديث والمستقر
                var response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                var data = await response.json();
                document.getElementById('loadingText').style.display = 'none';

                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    var aiText = data.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/\*\*/g, '');
                    document.getElementById('scriptOutput').innerText = aiText;
                    document.getElementById('resultBox').style.display = 'block';
                } else {
                    document.getElementById('scriptOutput').innerText = "خطأ: تأكد من نسخ المفتاح الكامل من مربع الحوار (Pop-up) الذي ظهر في الصورة الأخيرة وليس من الواجهة الخلفية.";
                    document.getElementById('resultBox').style.display = 'block';
                }

            } catch (error) {
                document.getElementById('loadingText').style.display = 'none';
                alert("حدث خطأ أثناء الاتصال بالخادم، تأكد من صحة المفتاح.");
            }
        }
    </script>
</body>
</html>
