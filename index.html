<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيكول AI | لوحة صناعة المحتوى</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 90%;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            margin: 30px auto;
        }
        h1 {
            font-size: 2rem;
            color: #ffca28;
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: right;
            color: #ffca28;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: #111827;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: right;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ffca28;
        }
        .btn {
            width: 100%;
            background-color: #ffca28;
            color: #0b0f19;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .btn:hover {
            background-color: #ffe082;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 8px;
            border-right: 4px solid #ffca28;
            display: none;
            text-align: right;
            line-height: 1.8;
        }
        .result-box h3 {
            margin-top: 0;
            color: #ffca28;
        }
        .loading {
            display: none;
            color: #ffca28;
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
        }
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #4b5563;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 جيكول AI - صانع السكربتات الذكي</h1>
        
        <label for="topic">عنون الفيديو أو الفكرة الرئيسيّة:</label>
        <input type="text" id="topic" placeholder="مثال: الثورة الصناعية بشكل مبسط">

        <label for="duration">مدة السكربت المطلوبة:</label>
        <select id="duration">
            <option value="short">فيديو قصير (Shorts / Reels) - دقيقة</option>
            <option value="medium">فيديو يوتيوب متوسط - 5 دقائق</option>
            <option value="long">وثائقي عميق - 15 دقيقة</option>
        </select>

        <button class="btn" onclick="generateScript()">توليد السكربت بالذكاء الاصطناعي ✨</button>

        <div class="loading" id="loadingText">جاري تحليل البيانات وصياغة المحتوى... 🧠</div>

        <div class="result-box" id="resultBox">
            <h3>📜 السكربت الجاهز:</h3>
            <p id="scriptOutput" style="white-space: pre-line;"></p>
        </div>
    </div>

    <footer>جميع الحقوق محفوظة © 2026 جيكول AI</footer>

    <script>
        function generateScript() {
            var topic = document.getElementById('topic').value.trim();
            if(topic === "") {
                alert("من فضلك أدخل عنواناً أو فكرة أولاً يا صديقي!");
                return;
            }

            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            setTimeout(function() {
                document.getElementById('loadingText').style.display = 'none';
                var output = "";

                // فحص ما إذا كان المستخدم يبحث عن الثورة الصناعية
                if (topic.includes("الثورة الصناعية") || topic.includes("ثورة صناعية")) {
                    output = "**🎬 عنوان الفيديو المقترح:** كيف غيّرت الآلة وجه البشرية؟\n\n" +
                             "**[المقدمة - صوت جهوري هادئ مع صوت تروس حديدية تتحرك وموسيقى وثائقية]**\n" +
                             "تخيل أن تعيش في عالمٍ كل شيء فيه يُصنع يدوياً.. ملابسك، طعامك، وأدواتك. وفجأة، في منتصف القرن الثامن عشر، استيقظ العالم على صوت محركات البخار العملاقة. أهلاً بكم في قصة الانفجار الذي نقل البشرية من الحقول إلى المصانع: الثورة الصناعية.\n\n" +
                             "**[المشهد الأول - البداية من بريطانيا]**\n" +
                             "بدأ كل شيء في بريطانيا، حيث تحولت طاقة الفحم الحجري ومحركات جيمس واط البخارية إلى القوة المحركة للقرن الجديد. المصانع بدأت تلتهم المواد الخام وتنتج الملابس والحديد بسرعة البرق، مما جعل المدن تكتظ بملايين العمال.\n\n" +
                             "**[المشهد الثاني - التأثير والجانب المظلم]**\n" +
                             "لكن هذا التطور لم يكن وردياً بالكامل؛ خلف القطارات السريعة والسفن الضخمة، كانت هناك عائلات تعمل لـ 14 ساعة يومياً، وأطفال يشتغلون وسط الآلات الخطيرة. لقد غيرت هذه الثورة شكل الاقتصاد، وقسمت العالم إلى قوى صناعية كبرى وأخرى مستهلكة.\n\n" +
                             "**[الخاتمة والدعوة للإجراء]**\n" +
                             "في النهاية، الثورة الصناعية لم تغير الآلات فقط، بل غيرت طريقة عيشنا وتفكيرنا إلى الأبد. والآن أخبرنا في التعليقات: هل تعتقد أن الذكاء الاصطناعي اليوم هو الثورة الصناعية الجديدة؟\n" +
                             "لا تنسَ الإعجاب بالفيديو والاشتراك في القناة لنستمر في سرد التاريخ!";
                } else {
                    // نص ذكي للمواضيع الأخرى لحين ربط الـ API
                    output = "✨ **مرحباً بك في جيكول AI** ✨\n\n" +
                             "لقد استلمنا فكرتك الذكية الرائعة عن: **(" + topic + ")**.\n\n" +
                             "جاري حالياً تجهيز وإعداد قاعدة البيانات البرمجية الشاملة لتغطية هذا الموضوع وتوليد سكربت احترافي مخصص له بدقة عالية.\n\n" +
                             "💡 *ملاحظة المطور:* بما أن الموقع في مرحلته التجريبية الأولى، جرب الآن كتابة **'الثورة الصناعية'** في الصندوق لتشاهد كيف يقوم النظام بصياغة المشاهد والمؤثرات الصوتية فوراً!";
                }
                
                document.getElementById('scriptOutput').innerText = output;
                document.getElementById('resultBox').style.display = 'block';
            }, 1500);
        }
    </script>

</body>
</html>
